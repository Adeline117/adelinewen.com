<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>P2 · Purple Dark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#1A1530;--bg2:#3C3489;--p1:#7C5CF0;--p2:#896AFB;--light:#EEEDFE;--gray:#9C97C0}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--light);font-family:'Space Grotesk',sans-serif;overflow-x:hidden}
  .glow{position:fixed;width:55vw;height:55vw;left:58%;top:42%;transform:translate(-50%,-50%);z-index:0;
    background:radial-gradient(circle,rgba(124,92,240,.45),rgba(137,106,251,.12) 42%,transparent 68%);filter:blur(40px);
    animation:breathe 9s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.14)}}
  canvas{position:fixed;inset:0;z-index:1}
  .wrap{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column}
  nav{display:flex;justify-content:space-between;align-items:center;padding:30px 6vw;font-size:14px}
  nav .logo{font-weight:700;letter-spacing:-.01em}
  nav .links{display:flex;gap:34px;align-items:center;color:var(--gray)}
  nav .links a{color:inherit;text-decoration:none;transition:.25s;font-weight:500}
  nav .links a:hover{color:#fff}
  nav .links .pill{padding:10px 22px;border-radius:100px;background:linear-gradient(108deg,var(--p1),var(--p2));color:#fff}
  .hero{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 6vw 6vh}
  .badge{display:inline-flex;align-items:center;gap:9px;width:fit-content;padding:8px 16px;border-radius:100px;
    background:rgba(238,237,254,.07);border:1px solid rgba(238,237,254,.14);backdrop-filter:blur(12px);font-size:13px;color:var(--light);margin-bottom:30px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--p2);box-shadow:0 0 12px var(--p2)}
  h1{font-weight:700;font-size:clamp(50px,8vw,128px);line-height:.96;letter-spacing:-.035em}
  h1 .grad{background:linear-gradient(108deg,#B9A9FF,var(--p2),var(--p1));-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{margin-top:30px;max-width:540px;font-size:clamp(16px,1.3vw,19px);line-height:1.65;color:#BDB8DA;font-weight:400}
  .cta{margin-top:44px;display:flex;gap:14px}
  .btn{padding:15px 32px;border-radius:100px;text-decoration:none;font-size:15px;font-weight:600;transition:.25s}
  .btn.solid{background:linear-gradient(108deg,var(--p1),var(--p2));color:#fff;box-shadow:0 12px 40px rgba(124,92,240,.5)}
  .btn.solid:hover{transform:translateY(-2px);box-shadow:0 18px 50px rgba(124,92,240,.65)}
  .btn.glass{background:rgba(238,237,254,.06);border:1px solid rgba(238,237,254,.16);color:#fff;backdrop-filter:blur(12px)}
  .foot{display:flex;justify-content:space-between;padding:24px 6vw;font-size:12px;color:var(--gray)}
</style>
</head>
<body>
<div class="glow"></div>
<canvas id="c"></canvas>
<div class="wrap">
  <nav>
    <div class="logo">Adeline Wen</div>
    <div class="links"><a href="#">Work</a><a href="#">About</a><a href="#">Research</a><a class="pill" href="#">Let's talk</a></div>
  </nav>
  <header class="hero">
    <div class="badge"><span class="dot"></span> Open to 2026 opportunities</div>
    <h1>I craft <span class="grad">delightful</span><br>software &amp; research.</h1>
    <p class="sub">CS @ University of Washington. Decentralized computing researcher & builder, with an eye for interfaces that feel alive.</p>
    <div class="cta">
      <a class="btn solid" href="#">View my work</a>
      <a class="btn glass" href="#">Say hello</a>
    </div>
  </header>
  <footer class="foot"><span>Seattle, WA</span><span>↓ scroll to explore</span><span>adelinewen.com</span></footer>
</div>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');let w,h,P;
function rs(){w=c.width=innerWidth;h=c.height=innerHeight;P=Array.from({length:Math.min(80,innerWidth/18)},()=>({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25}))}
rs();addEventListener('resize',rs);
function loop(){x.clearRect(0,0,w,h);for(const p of P){p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1}
for(let i=0;i<P.length;i++)for(let j=i+1;j<P.length;j++){const a=P[i],b=P[j],d=Math.hypot(a.x-b.x,a.y-b.y);if(d<130){x.strokeStyle='rgba(137,106,251,'+(1-d/130)*.18+')';x.beginPath();x.moveTo(a.x,a.y);x.lineTo(b.x,b.y);x.stroke()}}
for(const p of P){x.fillStyle='rgba(185,169,255,.6)';x.beginPath();x.arc(p.x,p.y,1.5,0,7);x.fill()}requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>
