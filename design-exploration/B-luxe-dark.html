<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>B · Warm Dark Luxe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#15120E;--cream:#EDE7DA;--gold:#C9A876;--taupe:#6E6353;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--cream);font-family:'Inter',sans-serif;overflow-x:hidden}
  .orb{position:fixed;width:60vw;height:60vw;left:50%;top:46%;transform:translate(-50%,-50%);
    background:radial-gradient(circle at 50% 50%, rgba(201,168,118,.28), rgba(201,168,118,.06) 40%, transparent 66%);
    filter:blur(24px);z-index:0;animation:breathe 9s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.12)}}
  canvas{position:fixed;inset:0;z-index:1}
  .wrap{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column}
  nav{display:flex;justify-content:space-between;align-items:center;padding:34px 6vw;font-size:13px;letter-spacing:.06em}
  nav .logo{font-family:'Cormorant Garamond';font-size:22px;letter-spacing:.04em}
  nav .links{display:flex;gap:34px;color:var(--taupe);text-transform:uppercase;font-size:11px;letter-spacing:.18em}
  nav .links a{color:inherit;text-decoration:none;transition:color .3s}
  nav .links a:hover{color:var(--gold)}
  .hero{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:0 6vw}
  .eyebrow{font-size:11px;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:32px}
  h1{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(56px,12vw,180px);line-height:.96;letter-spacing:.01em}
  h1 em{font-style:italic;color:var(--gold)}
  .sub{margin-top:30px;max-width:520px;font-weight:300;font-size:clamp(15px,1.3vw,18px);line-height:1.7;color:#A9A091}
  .btn{margin-top:46px;padding:15px 40px;border:1px solid var(--gold);border-radius:2px;color:var(--gold);text-decoration:none;
    font-size:12px;letter-spacing:.22em;text-transform:uppercase;transition:.35s}
  .btn:hover{background:var(--gold);color:var(--bg)}
  .foot{display:flex;justify-content:space-between;padding:28px 6vw;font-size:11px;color:var(--taupe);letter-spacing:.14em;text-transform:uppercase}
</style>
</head>
<body>
<div class="orb"></div>
<canvas id="c"></canvas>
<div class="wrap">
  <nav>
    <div class="logo">Adeline Wen</div>
    <div class="links"><a href="#">Work</a><a href="#">About</a><a href="#">Research</a><a href="#">Contact</a></div>
  </nav>
  <header class="hero">
    <div class="eyebrow">Software · Research · Design</div>
    <h1>Adeline <em>Wen</em></h1>
    <p class="sub">CS @ University of Washington. I build decentralized systems and crafted interfaces — engineering with a sense of taste.</p>
    <a class="btn" href="#">Explore Work</a>
  </header>
  <footer class="foot"><span>Seattle · 2026</span><span>↓ Scroll</span><span>adelinewen.com</span></footer>
</div>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');let w,h,P;
function rs(){w=c.width=innerWidth;h=c.height=innerHeight;P=Array.from({length:Math.min(70,innerWidth/22)},()=>({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.6+.4,s:Math.random()*.4+.1,o:Math.random()*.5+.2}))}
rs();addEventListener('resize',rs);
function loop(){x.clearRect(0,0,w,h);for(const p of P){p.y-=p.s;if(p.y<-5)p.y=h+5;x.fillStyle='rgba(201,168,118,'+p.o+')';x.beginPath();x.arc(p.x,p.y,p.r,0,7);x.fill()}requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>
