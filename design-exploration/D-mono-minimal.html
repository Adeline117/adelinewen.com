<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>D · Minimal Mono</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0B0B0C;--text:#F2F2F0;--dim:#6B6B6E;--accent:#E2E2DD;--line:#1C1C1E}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:'Geist',sans-serif;overflow-x:hidden}
  .grid{position:fixed;inset:0;z-index:0;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:64px 64px;mask-image:radial-gradient(ellipse 80% 60% at 50% 40%,#000 30%,transparent 75%);
    -webkit-mask-image:radial-gradient(ellipse 80% 60% at 50% 40%,#000 30%,transparent 75%)}
  canvas{position:fixed;inset:0;z-index:1}
  .wrap{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column}
  nav{display:flex;justify-content:space-between;align-items:center;padding:30px 5vw;font-family:'Geist Mono';font-size:13px;letter-spacing:.02em}
  nav .logo{color:var(--text)}
  nav .links{display:flex;gap:30px;color:var(--dim)}
  nav .links a{color:inherit;text-decoration:none;transition:.25s}
  nav .links a:hover{color:var(--text)}
  nav .links a::before{content:"/ ";color:#3a3a3d}
  .hero{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 5vw}
  .meta{font-family:'Geist Mono';font-size:12px;color:var(--dim);letter-spacing:.04em;margin-bottom:26px;display:flex;gap:24px}
  .meta b{color:var(--text);font-weight:400}
  h1{font-weight:500;font-size:clamp(44px,8.5vw,128px);line-height:1.0;letter-spacing:-.035em}
  h1 .o{color:var(--dim)}
  .sub{margin-top:30px;max-width:520px;font-weight:300;font-size:clamp(15px,1.3vw,18px);line-height:1.65;color:#A1A1A4}
  .cta{margin-top:40px;display:flex;gap:14px;align-items:center;font-family:'Geist Mono';font-size:13px}
  .btn{padding:13px 24px;border:1px solid #2a2a2d;border-radius:6px;color:var(--text);text-decoration:none;transition:.25s;display:inline-flex;gap:8px;align-items:center}
  .btn:hover{border-color:var(--text);background:#141416}
  .btn .arr{transition:transform .25s}
  .btn:hover .arr{transform:translateX(4px)}
  .foot{display:flex;justify-content:space-between;padding:24px 5vw;font-family:'Geist Mono';font-size:11px;color:var(--dim)}
</style>
</head>
<body>
<div class="grid"></div>
<canvas id="c"></canvas>
<div class="wrap">
  <nav>
    <div class="logo">adeline_wen</div>
    <div class="links"><a href="#">work</a><a href="#">about</a><a href="#">research</a><a href="#">contact</a></div>
  </nav>
  <header class="hero">
    <div class="meta"><span>STATUS · <b>open to work</b></span><span>BASED · <b>Seattle</b></span><span>2026</span></div>
    <h1>Adeline Wen<br><span class="o">— software &amp; research.</span></h1>
    <p class="sub">CS @ University of Washington. I work on decentralized computing and build precise, fast, well-crafted software.</p>
    <div class="cta">
      <a class="btn" href="#">View work <span class="arr">→</span></a>
      <a class="btn" href="#">Contact</a>
    </div>
  </header>
  <footer class="foot"><span>© 2026 Adeline Wen</span><span>↓ scroll</span><span>adelinewen.com</span></footer>
</div>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');let w,h,P;
function rs(){w=c.width=innerWidth;h=c.height=innerHeight;P=Array.from({length:Math.min(60,innerWidth/24)},()=>({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2}))}
rs();addEventListener('resize',rs);
function loop(){x.clearRect(0,0,w,h);for(const p of P){p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1}
for(let i=0;i<P.length;i++)for(let j=i+1;j<P.length;j++){const a=P[i],b=P[j],d=Math.hypot(a.x-b.x,a.y-b.y);if(d<120){x.strokeStyle='rgba(180,180,180,'+(1-d/120)*.07+')';x.beginPath();x.moveTo(a.x,a.y);x.lineTo(b.x,b.y);x.stroke()}}
for(const p of P){x.fillStyle='rgba(226,226,221,.35)';x.beginPath();x.arc(p.x,p.y,1.3,0,7);x.fill()}requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>
