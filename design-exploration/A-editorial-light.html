<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A · Editorial Warm Light</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F1EA; --ink:#1C1B19; --accent:#B5512E; --gray:#9B978C;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:'Space Grotesk',sans-serif;overflow-x:hidden}
  canvas{position:fixed;inset:0;z-index:0}
  .wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}
  nav{display:flex;justify-content:space-between;align-items:center;padding:32px 6vw;font-size:14px;letter-spacing:.02em}
  nav .logo{font-weight:600}
  nav .links{display:flex;gap:36px;color:var(--gray)}
  nav .links a{color:inherit;text-decoration:none;transition:color .25s}
  nav .links a:hover{color:var(--ink)}
  .hero{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 6vw 8vh}
  .eyebrow{font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);margin-bottom:28px}
  h1{font-family:'Instrument Serif',serif;font-weight:400;font-size:clamp(56px,11vw,168px);line-height:.92;letter-spacing:-.01em}
  h1 em{font-style:italic;color:var(--accent)}
  .sub{margin-top:34px;max-width:540px;font-size:clamp(16px,1.4vw,19px);line-height:1.6;color:#56544E}
  .cta{margin-top:44px;display:flex;gap:18px;align-items:center}
  .btn{padding:14px 28px;border-radius:100px;background:var(--ink);color:var(--bg);text-decoration:none;font-size:14px;font-weight:500;transition:transform .25s}
  .btn:hover{transform:translateY(-2px)}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid #00000022}
  .foot{display:flex;justify-content:space-between;padding:28px 6vw;font-size:12px;color:var(--gray);letter-spacing:.04em}
  .scroll{font-size:12px;color:var(--gray);letter-spacing:.2em}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="wrap">
  <nav>
    <div class="logo">Adeline Wen</div>
    <div class="links"><a href="#">Work</a><a href="#">About</a><a href="#">Research</a><a href="#">Contact</a></div>
  </nav>
  <header class="hero">
    <div class="eyebrow">Portfolio — 2026</div>
    <h1>Building at the<br>edge of <em>code</em><br>& <em>research</em>.</h1>
    <p class="sub">CS @ University of Washington. Decentralized computing, systems, and things that feel as good as they work.</p>
    <div class="cta">
      <a class="btn" href="#">View Work</a>
      <a class="btn ghost" href="#">Get in touch</a>
    </div>
  </header>
  <footer class="foot"><span>Seattle, WA</span><span class="scroll">SCROLL ↓</span><span>adelinewen.com</span></footer>
</div>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');let w,h,pts;
function rs(){w=c.width=innerWidth;h=c.height=innerHeight;pts=Array.from({length:Math.min(90,innerWidth/16)},()=>({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25}))}
rs();addEventListener('resize',rs);
function loop(){x.clearRect(0,0,w,h);for(const p of pts){p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1}
for(let i=0;i<pts.length;i++){for(let j=i+1;j<pts.length;j++){const a=pts[i],b=pts[j],d=Math.hypot(a.x-b.x,a.y-b.y);if(d<130){x.strokeStyle='rgba(28,27,25,'+(1-d/130)*.12+')';x.lineWidth=1;x.beginPath();x.moveTo(a.x,a.y);x.lineTo(b.x,b.y);x.stroke()}}}
for(const p of pts){x.fillStyle='rgba(181,81,46,.5)';x.beginPath();x.arc(p.x,p.y,1.6,0,7);x.fill()}requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>
